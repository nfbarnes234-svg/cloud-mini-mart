openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Mini Mart POS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: categories
  - name: products
  - name: customers
  - name: sales
  - name: expenses
  - name: dashboard
  - name: reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /products/{id}/adjust-stock:
    post:
      operationId: adjustProductStock
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustmentInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          description: Not found

  /sales/{id}/void:
    post:
      operationId: voidSale
      tags: [sales]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Voided sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          description: Not found

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/sales-chart:
    get:
      operationId: getSalesChart
      tags: [dashboard]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 14
      responses:
        "200":
          description: Daily sales totals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesChartPoint"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top selling products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [dashboard]
      responses:
        "200":
          description: Products at or below minimum stock
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /reports/sales-by-category:
    get:
      operationId: getSalesByCategory
      tags: [reports]
      responses:
        "200":
          description: Sales grouped by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySalesBreakdown"

  /reports/sales-by-cashier:
    get:
      operationId: getSalesByCashier
      tags: [reports]
      responses:
        "200":
          description: Sales grouped by cashier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashierSalesBreakdown"

  /reports/sales-by-payment-method:
    get:
      operationId: getSalesByPaymentMethod
      tags: [reports]
      responses:
        "200":
          description: Sales grouped by payment method
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethodBreakdown"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Role:
      type: string
      enum: [owner, manager, cashier]

    User:
      type: object
      required: [id, name, email, role, active, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role:
          $ref: "#/components/schemas/Role"
        active: { type: boolean }
        createdAt: { type: string, format: date-time }

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string }
        password: { type: string, minLength: 6 }
        role:
          $ref: "#/components/schemas/Role"

    UserUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string }
        password: { type: string, minLength: 6 }
        role:
          $ref: "#/components/schemas/Role"
        active: { type: boolean }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    Category:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        createdAt: { type: string, format: date-time }

    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }

    Product:
      type: object
      required:
        [
          id,
          name,
          sku,
          barcode,
          categoryId,
          purchasePrice,
          sellingPrice,
          stock,
          minStock,
          unit,
          createdAt,
        ]
      properties:
        id: { type: integer }
        name: { type: string }
        sku: { type: string }
        barcode: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        categoryName: { type: ["string", "null"] }
        purchasePrice: { type: number }
        sellingPrice: { type: number }
        stock: { type: integer }
        minStock: { type: integer }
        unit: { type: string }
        createdAt: { type: string, format: date-time }

    ProductInput:
      type: object
      required: [name, sku, purchasePrice, sellingPrice, stock, minStock, unit]
      properties:
        name: { type: string, minLength: 1 }
        sku: { type: string, minLength: 1 }
        barcode: { type: string }
        categoryId: { type: integer }
        purchasePrice: { type: number }
        sellingPrice: { type: number }
        stock: { type: integer }
        minStock: { type: integer }
        unit: { type: string }

    ProductUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        sku: { type: string, minLength: 1 }
        barcode: { type: string }
        categoryId: { type: integer }
        purchasePrice: { type: number }
        sellingPrice: { type: number }
        stock: { type: integer }
        minStock: { type: integer }
        unit: { type: string }

    StockAdjustmentInput:
      type: object
      required: [quantityChange, reason]
      properties:
        quantityChange: { type: integer }
        reason: { type: string }

    Customer:
      type: object
      required:
        [id, name, phone, loyaltyPoints, outstandingBalance, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        loyaltyPoints: { type: integer }
        outstandingBalance: { type: number }
        createdAt: { type: string, format: date-time }

    CustomerInput:
      type: object
      required: [name, phone]
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string, minLength: 1 }
        email: { type: string }
        address: { type: string }
        notes: { type: string }

    CustomerUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string, minLength: 1 }
        email: { type: string }
        address: { type: string }
        notes: { type: string }
        loyaltyPoints: { type: integer }
        outstandingBalance: { type: number }

    SaleItemInput:
      type: object
      required: [productId, quantity, unitPrice]
      properties:
        productId: { type: integer }
        quantity: { type: integer }
        unitPrice: { type: number }
        discount: { type: number }

    SaleInput:
      type: object
      required: [items, paymentMethod, amountPaid]
      properties:
        customerId: { type: integer }
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SaleItemInput"
        discount: { type: number }
        tax: { type: number }
        paymentMethod:
          type: string
          enum: [cash, mobile_money, card, split]
        amountPaid: { type: number }

    SaleItem:
      type: object
      required:
        [id, productId, productName, quantity, unitPrice, discount, lineTotal]
      properties:
        id: { type: integer }
        productId: { type: integer }
        productName: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }
        discount: { type: number }
        lineTotal: { type: number }

    Sale:
      type: object
      required:
        [
          id,
          invoiceNumber,
          cashierId,
          cashierName,
          subtotal,
          discount,
          tax,
          total,
          amountPaid,
          changeDue,
          paymentMethod,
          status,
          items,
          createdAt,
        ]
      properties:
        id: { type: integer }
        invoiceNumber: { type: string }
        cashierId: { type: integer }
        cashierName: { type: string }
        customerId: { type: ["integer", "null"] }
        customerName: { type: ["string", "null"] }
        subtotal: { type: number }
        discount: { type: number }
        tax: { type: number }
        total: { type: number }
        amountPaid: { type: number }
        changeDue: { type: number }
        paymentMethod: { type: string }
        status: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        createdAt: { type: string, format: date-time }

    Expense:
      type: object
      required: [id, description, amount, category, createdAt]
      properties:
        id: { type: integer }
        description: { type: string }
        amount: { type: number }
        category: { type: string }
        createdAt: { type: string, format: date-time }

    ExpenseInput:
      type: object
      required: [description, amount, category]
      properties:
        description: { type: string, minLength: 1 }
        amount: { type: number }
        category: { type: string, minLength: 1 }

    DashboardSummary:
      type: object
      required:
        [
          todaySales,
          weekSales,
          monthSales,
          yearSales,
          profitToday,
          expensesToday,
          inventoryValue,
          lowStockCount,
          outOfStockCount,
          transactionsToday,
        ]
      properties:
        todaySales: { type: number }
        weekSales: { type: number }
        monthSales: { type: number }
        yearSales: { type: number }
        profitToday: { type: number }
        expensesToday: { type: number }
        inventoryValue: { type: number }
        lowStockCount: { type: integer }
        outOfStockCount: { type: integer }
        transactionsToday: { type: integer }

    SalesChartPoint:
      type: object
      required: [date, total]
      properties:
        date: { type: string }
        total: { type: number }

    TopProduct:
      type: object
      required: [productId, name, quantitySold, revenue]
      properties:
        productId: { type: integer }
        name: { type: string }
        quantitySold: { type: integer }
        revenue: { type: number }

    CategorySalesBreakdown:
      type: object
      required: [category, total]
      properties:
        category: { type: string }
        total: { type: number }

    CashierSalesBreakdown:
      type: object
      required: [cashierName, total, transactions]
      properties:
        cashierName: { type: string }
        total: { type: number }
        transactions: { type: integer }

    PaymentMethodBreakdown:
      type: object
      required: [paymentMethod, total]
      properties:
        paymentMethod: { type: string }
        total: { type: number }
